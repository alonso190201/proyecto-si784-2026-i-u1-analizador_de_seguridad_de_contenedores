<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC | Analizador de Contenedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="app-shell">
        <aside class="rail">
            <a class="brand" href="/">
                <span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span>
                <span>
                    <strong>ASC</strong>
                    <small>Container Security</small>
                </span>
            </a>

            <nav class="rail-nav" aria-label="Navegacion principal">
                <a class="rail-link active" href="/">
                    <i class="fa-solid fa-chart-simple"></i>
                    <span>Panel</span>
                </a>
                <button class="rail-link rail-button" type="button" data-bs-toggle="modal" data-bs-target="#historyModal">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span>Historial</span>
                </button>
            </nav>

            <div class="rail-footer">
                <span class="status-dot"></span>
                <span>Listo</span>
            </div>
        </aside>

        <main class="workspace">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Static analysis</p>
                    <h1>Analizador de Seguridad de Contenedores</h1>
                </div>
                <div class="topbar-actions">
                    <div class="token-control">
                        <i class="fa-solid fa-key"></i>
                        <input id="apiTokenInput" type="password" placeholder="Token API opcional" autocomplete="off">
                    </div>
                    <a class="icon-button" href="https://github.com/alonso190201/proyecto-si784-2026-i-u1-analizador_de_seguridad_de_contenedores" target="_blank" rel="noreferrer" title="Repositorio">
                        <i class="fa-brands fa-github"></i>
                    </a>
                </div>
            </header>

            <section class="content-area">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>

    <div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <p class="eyebrow mb-1">Analisis recientes</p>
                        <h5 class="modal-title">Historial local</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="historyContainer" class="history-list"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-danger btn-sm" id="clearHistoryBtn">
                        <i class="fa-solid fa-trash-can"></i>
                        Borrar
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast align-items-center border-0" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="appToastBody"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Cerrar"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        window.getApiHeaders = function(extra) {
            const headers = Object.assign({}, extra || {});
            const token = localStorage.getItem('asc_api_token') || '';
            if (token) headers['X-API-Token'] = token;
            return headers;
        };
        window.showToast = function(message, tone) {
            const toastEl = document.getElementById('appToast');
            const body = document.getElementById('appToastBody');
            body.textContent = message;
            toastEl.className = `toast align-items-center border-0 text-bg-${tone || 'dark'}`;
            bootstrap.Toast.getOrCreateInstance(toastEl).show();
        };
        document.addEventListener('DOMContentLoaded', () => {
            const tokenInput = document.getElementById('apiTokenInput');
            tokenInput.value = localStorage.getItem('asc_api_token') || '';
            tokenInput.addEventListener('change', () => {
                localStorage.setItem('asc_api_token', tokenInput.value.trim());
                window.showToast('Token actualizado.', 'success');
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
